syntax = "proto3";

package user;

option go_package = "gen/go/user;user";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "validate/validate.proto";

enum Role {

    ROLE_UNSPECIFIED = 0;

    ROLE_USER = 1;

    ROLE_ADMIN = 2;

}

service UserService {
    rpc Register(RegisterUserRequest)
        returns (RegisterUserResponse);

    rpc GetUser(GetUserRequest)
        returns (GetUserResponse);

    rpc UpdateUser(UpdateUserRequest)
        returns (UpdateUserResponse);

    rpc DeleteUser(DeleteUserRequest)
        returns (DeleteUserResponse);

    rpc Deposit(DepositRequest)
        returns (DepositResponse);

    rpc Authorization(AuthorizationRequest)
        returns (AuthorizationResponse);
}

message Balance {

    string asset = 1;

    string available = 2;

    string locked = 3;

}

message RegisterUserRequest  {
    string login = 1 [
        (validate.rules).string = {
            min_len: 3,
            max_len: 20,
            pattern: "^[a-zA-Z0-9_]+$",
        }
    ];
    string password = 2 [
        (validate.rules).string = {
            min_len: 6,
            max_len: 64,
        }
    ];
}
message RegisterUserResponse { 
    string id = 1;
    google.protobuf.Timestamp created_at = 2;
}

message GetUserRequest{
    string id = 1 [
        (validate.rules).string.uuid = true
    ];
}
message GetUserResponse {
    string name = 2;
    string login = 3;

    repeated Balance balances = 4;

    Role role = 5;

    google.protobuf.Timestamp created_at = 6;
    google.protobuf.Timestamp updated_at = 7;
}

message UpdateUserRequest{
    string id = 1 [
        (validate.rules).string.uuid = true
    ];

    google.protobuf.StringValue name = 2 [
        (validate.rules).message = {
            required: false,
        }
    ];
    google.protobuf.StringValue login = 3 [
        (validate.rules).message = {
            required: false,
        }
    ];
    google.protobuf.StringValue password = 4 [
        (validate.rules).message = {
            required: true,
        }
    ];
}
message UpdateUserResponse{
    string id = 1;
    google.protobuf.Timestamp updated_at = 2;
}

message DeleteUserRequest{
    string id = 1 [
        (validate.rules).string.uuid = true
    ];
}
message DeleteUserResponse{
    bool success = 1;
}

message DepositRequest  {
    string id = 1 [
        (validate.rules).string.uuid = true
    ];
    string asset = 2 [
        (validate.rules).string = {
            min_len: 1,
            max_len: 20,
            pattern: "^[A-Z_]+$",
        }
    ];
    string amount = 3 [
        (validate.rules).string = {
            min_len: 1,
            pattern: "^[0-9_]+$",
        }
    ];
}

message DepositResponse {
    string id = 1;
    Balance balance = 2;
}

message AuthorizationRequest{
    string login = 1 [
        (validate.rules).string = {
            min_len: 3,
            max_len: 20,
            pattern: "^[a-zA-Z0-9_]+$",
        }
    ];
    string password = 2 [
        (validate.rules).string = {
            min_len: 6,
            max_len: 64,
        }
    ];
}

message AuthorizationResponse {
    string token = 1;
}