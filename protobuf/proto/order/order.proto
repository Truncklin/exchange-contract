syntax = "proto3";

package order;

option go_package = "gen/go/order;order";

import "google/protobuf/timestamp.proto";
import "validate/validate.proto";

service OrderService {

    rpc CreateOrder(CreateOrderRequest)
        returns (CreateOrderResponse);

    rpc GetOrderStatus(GetOrderStatusRequest)
        returns (GetOrderStatusResponse);

    rpc StreamOrderUpdate(StreamOrderUpdateRequest)
        returns (StreamOrderUpdateResponse);
}

enum OrderType {
    ORDER_TYPE_UNSPECIFIED = 0;
    ORDER_TYPE_BUY = 1;
    ORDER_TYPE_SELL = 2;
}

enum OrderStatus {
    ORDER_STATUS_UNSPECIFIED = 0;
    ORDER_STATUS_CREATED = 1;
    ORDER_STATUS_CANCELED = 2;
    ORDER_STATUS_REJECTED = 3;
    ORDER_STATUS_COMPLETED = 4;
}

message Order {

    string id = 1;

    string user_id = 2;

    string spot_id = 3;

    OrderType order_type = 4;

    string price = 5;

    string quantity = 6;

    OrderStatus order_status = 7;

    google.protobuf.Timestamp created_at = 8;

    google.protobuf.Timestamp updated_at = 9;
}

message CreateOrderRequest {
    string user_id = 1 [
        (validate.rules).string.uuid = true
    ];

    string spot_id = 2  [
        (validate.rules).string.uuid = true
    ];

    OrderType order_type = 3 [
        (validate.rules).enum = {
            defined_only: true
        }
    ];

    string price = 4 [
        (validate.rules).string = {
            min_len: 1,
            pattern: "^[0-9]+(\\.[0-9]+)?$",
        }
    ];

    string quantity = 5 [
        (validate.rules).string = {
            min_len: 1,
            pattern: "^[0-9]+(\\.[0-9]+)?$",
        }    
    ];           
}

message CreateOrderResponse {
    string id = 1;

     OrderStatus order_status = 2;

     google.protobuf.Timestamp created_at = 3;
}

message GetOrderStatusRequest {
    string order_id = 1 [
        (validate.rules).string.uuid = true
    ];
}

message GetOrderStatusResponse {
    string user_id = 2;
    string spot_id = 3;

    OrderType order_type = 4;

    string price = 5;
    string quantity = 6;

    OrderStatus order_status = 7;

    google.protobuf.Timestamp created_at = 8;
    google.protobuf.Timestamp updated_at = 9;
}

message StreamOrderUpdateRequest {

    string order_id = 1 [
        (validate.rules).string.uuid = true
    ];

    string order_status = 2 [
        (validate.rules).string = {
            pattern: "^(CREATED|CANCELED|REJECTED|COMPLETED)$"
        }
    ];
}

message StreamOrderUpdateResponse {
    bool update_status_success = 1;
}